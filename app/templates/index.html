<!DOCTYPE html>
<html>
<head>
    <title>AI Chat Business</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .box {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px #ccc;
        }

        h1 {
            color: #2563eb;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            background: #2563eb;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="box">

<h1>🤖 AI Chat Business</h1>

<p>AI помощник для малого бизнеса</p>

<form action="/chat" method="post">

<textarea 
name="message"
placeholder="Напишите вопрос..."
></textarea>

<br>

<button>
Отправить
</button>

</form>

</div>

</body>
</html>
