<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>AI Chat Business</title>
</head>

<body>

<div class="chat-container">

    <h1 class="title">🤖 AI Chat Business</h1>

    <p style="text-align:center;">
        AI помощник для малого бизнеса
    </p>


    <div class="chat-box">

        {% for msg in messages %}

        {% if msg.role == "user" %}

        <div class="message user">
            👤 <b>Вы:</b><br>
            {{ msg.text }}
        </div>

        {% else %}

        <div class="message ai">
            🤖 <b>AI:</b><br>
            {{ msg.text }}
        </div>

        {% endif %}

        {% endfor %}

    </div>


    <form action="/chat" method="post">

        <select name="assistant">

            <option value="customer">
                📞 Клиентский менеджер
            </option>

            <option value="marketing">
                ✍️ Маркетолог
            </option>

            <option value="sales">
                💼 Продажи
            </option>

            <option value="documents">
                📄 Документы
            </option>

        </select>


        <br><br>


        <textarea
            name="message"
            placeholder="Напишите ваш вопрос..."
        ></textarea>


        <br><br>


        <button>
            Отправить
        </button>


    </form>

</div>

</body>
</html>
